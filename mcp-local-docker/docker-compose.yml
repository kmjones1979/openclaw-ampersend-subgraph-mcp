version: '3.9'
services:
  mcp:
    build:
      context: ./subgraph-mcp
      dockerfile: Dockerfile
    command: ["subgraph-mcp", "--sse"]
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - RUST_LOG=info
    restart: unless-stopped

  app:
    build:
      context: ./mcp-front
      dockerfile: Dockerfile
    depends_on:
      - mcp
    ports:
      - "8080:8080"
    environment:
      - MCP_HOST=http://mcp:8000
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
    restart: unless-stopped
